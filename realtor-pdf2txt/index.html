<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PDF → Text Cleaner</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Apple SD Gothic Neo,Noto Sans KR,Arial,sans-serif;max-width:1100px;margin:0 auto;padding:24px;line-height:1.4}
    h1{margin:0 0 12px}
    .row{display:flex;gap:16px;flex-wrap:wrap;align-items:flex-start}
    .card{border:1px solid #ddd;border-radius:12px;padding:14px;background:#fff}
    .left{flex:1 1 420px;min-width:320px}
    .right{flex:1 1 520px;min-width:320px}
    label{display:block;font-size:13px;margin:10px 0 6px;color:#333}
    input[type="number"], input[type="text"]{width:140px;padding:8px;border:1px solid #ccc;border-radius:8px}
    input[type="file"]{margin-top:6px}
    button{padding:10px 12px;border:1px solid #ccc;border-radius:10px;background:#f7f7f7;cursor:pointer}
    button.primary{background:#111;color:#fff;border-color:#111}
    button:disabled{opacity:.5;cursor:not-allowed}
    .btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
    .hint{font-size:12px;color:#666;margin-top:8px}
    textarea{width:100%;height:420px;margin-top:10px;font-size:14px;padding:10px;border:1px solid #ccc;border-radius:10px;white-space:pre-wrap}
    .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    a.back{text-decoration:none;color:#111;border:1px solid #ddd;padding:8px 10px;border-radius:10px}
    .previewWrap{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-start}
    canvas{border:1px solid #ddd;border-radius:10px;max-width:100%;height:auto}
    .small{font-size:12px;color:#444}
    .toggle{display:flex;gap:8px;align-items:center;margin-top:8px}
  </style>
</head>
<body>
  <div class="topbar">
    <a class="back" href="../">← Tool Hub</a>
    <div class="small">Client-only / GitHub Pages</div>
  </div>

  <h1>PDF → Text Cleaner</h1>
  <div class="row">
    <div class="card left">
      <label>PDF 업로드</label>
      <input type="file" id="pdfFile" accept="application/pdf" />

      <label>미리보기 페이지</label>
      <div class="previewWrap">
        <div>
          <input type="number" id="previewPage" min="1" value="1" />
          <button id="btnPreview" onclick="renderPreview()" disabled>미리보기</button>
          <div class="hint" id="pdfInfo">PDF를 올리면 페이지 수가 표시됩니다.</div>
        </div>
        <canvas id="previewCanvas"></canvas>
      </div>

      <label>텍스트 추출 페이지 범위</label>
      <div class="previewWrap">
        <div>
          <div class="small">Start</div>
          <input type="number" id="startPage" min="1" value="1" />
        </div>
        <div>
          <div class="small">End</div>
          <input type="number" id="endPage" min="1" value="1" />
        </div>
      </div>

      <label>과목/키워드로 “포함된 줄만” 남기기 (선택)</label>
      <input type="text" id="keepKeyword" placeholder="예: 민법 (비우면 전체)" />

      <div class="toggle">
        <input type="checkbox" id="autoColumns" checked />
        <label style="margin:0;">2단(컬럼) 자동 분리(권장)</label>
      </div>

      <div class="btns">
        <button class="primary" id="btnExtract" onclick="extractText()" disabled>Extract + Clean</button>
        <button id="btnDownload" onclick="downloadTxt()" disabled>Download TXT</button>
        <button onclick="copyToClipboard()" id="btnCopy" disabled>Copy</button>
      </div>

      <div class="hint">
        • 2단 PDF(좌/우 컬럼)는 “컬럼 자동 분리”를 켜야 순서가 덜 섞입니다.<br/>
        • 스캔본(이미지 PDF)은 여기서 텍스트가 잘 안 나옵니다(OCR 버전 필요).
      </div>
    </div>

    <div class="card right">
      <label>결과</label>
      <textarea id="output" placeholder="여기에 정리된 텍스트가 나옵니다."></textarea>
    </div>
  </div>

  <!-- pdf.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    // pdf.js worker 설정 (CDN)
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    let pdfDoc = null;

    const $ = (id) => document.getElementById(id);

    $("pdfFile").addEventListener("change", async () => {
      const file = $("pdfFile").files[0];
      if (!file) return;

      const buf = await file.arrayBuffer();
      pdfDoc = await pdfjsLib.getDocument({ data: buf }).promise;

      $("pdfInfo").textContent = `총 ${pdfDoc.numPages}페이지`;
      $("previewPage").max = pdfDoc.numPages;
      $("startPage").max = pdfDoc.numPages;
      $("endPage").max = pdfDoc.numPages;

      $("startPage").value = 1;
      $("endPage").value = pdfDoc.numPages;
      $("previewPage").value = 1;

      $("btnPreview").disabled = false;
      $("btnExtract").disabled = false;

      await renderPreview();
    });

    async function renderPreview() {
      if (!pdfDoc) return;
      const p = clampInt($("previewPage").value, 1, pdfDoc.numPages);
      $("previewPage").value = p;

      const page = await pdfDoc.getPage(p);
      const viewport = page.getViewport({ scale: 1.3 });

      const canvas = $("previewCanvas");
      const ctx = canvas.getContext("2d");

      canvas.width = Math.floor(viewport.width);
      canvas.height = Math.floor(viewport.height);

      await page.render({ canvasContext: ctx, viewport }).promise;
    }

    function clampInt(v, min, max) {
      const n = parseInt(v, 10);
      if (Number.isNaN(n)) return min;
      return Math.max(min, Math.min(max, n));
    }

    async function extractText() {
      if (!pdfDoc) {
        alert("PDF를 먼저 업로드하세요.");
        return;
      }

      const start = clampInt($("startPage").value, 1, pdfDoc.numPages);
      const end = clampInt($("endPage").value, 1, pdfDoc.numPages);
      $("startPage").value = start;
      $("endPage").value = end;

      if (start > end) {
        alert("Start가 End보다 클 수 없습니다.");
        return;
      }

      const keepKeyword = $("keepKeyword").value.trim();
      const useColumns = $("autoColumns").checked;

      $("btnExtract").disabled = true;
      $("btnExtract").textContent = "Processing...";

      let out = "";

      for (let i = start; i <= end; i++) {
        const page = await pdfDoc.getPage(i);
        const textContent = await page.getTextContent({ disableCombineTextItems: false });

        // 위치 기반으로 읽기 순서 재구성
        const pageText = reconstructTextFromItems(textContent.items, { useColumns });

        out += pageText + "\n\n";
      }

      out = cleanText(out, keepKeyword);

      $("output").value = out.trim() + "\n";
      $("btnDownload").disabled = false;
      $("btnCopy").disabled = false;

      $("btnExtract").disabled = false;
      $("btnExtract").textContent = "Extract + Clean";
    }

    function reconstructTextFromItems(items, { useColumns }) {
      // items: { str, transform, width, height, fontName }
      // transform: [a,b,c,d,e,f] 에서 e=x, f=y
      const chars = items
        .filter(it => it.str && it.str.trim().length > 0)
        .map(it => {
          const x = it.transform[4];
          const y = it.transform[5];
          return { s: it.str, x, y, w: it.width || 0 };
        });

      if (chars.length === 0) return "";

      // y는 위로 갈수록 큼(대개). 라인 분리를 위해 y 기준 내림차순 정렬.
      // 컬럼 분리(2단) 옵션
      if (useColumns) {
        const xs = chars.map(c => c.x).sort((a,b)=>a-b);
        const minX = xs[0], maxX = xs[xs.length-1];
        const midX = (minX + maxX) / 2;

        // 오른쪽에 충분히 많은 텍스트가 있으면 2단으로 가정
        const left = chars.filter(c => c.x < midX);
        const right = chars.filter(c => c.x >= midX);

        const leftRatio = left.length / chars.length;
        const rightRatio = right.length / chars.length;

        const isTwoColumn = (leftRatio > 0.25 && rightRatio > 0.25);

        if (isTwoColumn) {
          const leftText = reconstructOneColumn(left);
          const rightText = reconstructOneColumn(right);
          // 보통 시험지 2단은 왼쪽 컬럼 먼저 읽고 오른쪽 읽는 편이 안정적
          return (leftText + "\n\n" + rightText).trim();
        }
      }

      return reconstructOneColumn(chars).trim();
    }

    function reconstructOneColumn(chars) {
      // 1) y 기준 라인 그룹핑
      // y 간격 임계값: 대략 글자 높이 대신 경험치로 2.5~3.5 정도가 잘 먹힘.
      // PDF마다 다르니 “동일 라인” 판정은 y 차이가 작으면 같은 줄로.
      const sorted = chars.slice().sort((a,b) => {
        // y 내림차순(위→아래), x 오름차순(좌→우)
        if (Math.abs(b.y - a.y) > 1.0) return b.y - a.y;
        return a.x - b.x;
      });

      const lines = [];
      const yThreshold = 3.0;

      for (const c of sorted) {
        let line = lines.find(l => Math.abs(l.y - c.y) <= yThreshold);
        if (!line) {
          line = { y: c.y, items: [] };
          lines.push(line);
        }
        line.items.push(c);
      }

      // 2) 라인 정렬(위→아래)
      lines.sort((a,b) => b.y - a.y);

      // 3) 각 라인을 x 오름차순으로 정렬 후 공백 복원
      const rendered = lines.map(line => {
        line.items.sort((a,b)=>a.x-b.x);

        // 평균 글자 폭 추정
        let avgW = 0;
        let cnt = 0;
        for (const it of line.items) {
          const w = (it.w > 0 ? it.w : it.s.length * 5);
          avgW += w / Math.max(1, it.s.length);
          cnt++;
        }
        avgW = (cnt ? avgW / cnt : 5);

        let s = "";
        for (let i=0;i<line.items.length;i++) {
          const cur = line.items[i];
          const prev = line.items[i-1];

          if (i === 0) {
            s += cur.s;
            continue;
          }

          const gap = cur.x - prev.x - (prev.w || (prev.s.length * avgW));
          const needSpace = gap > avgW * 0.35;

          // 한국어/한자 시험지 특성상, 공백이 과도하게 들어가면 오히려 깨짐.
          // gap이 충분할 때만 스페이스 1개를 넣음.
          if (needSpace && !endsWithNoSpace(prev.s) && !startsWithNoSpace(cur.s)) {
            s += " ";
          }
          s += cur.s;
        }
        return s.trim();
      });

      // 4) 라인 합치기: 문장 중간 줄바꿈은 “후처리”에서 다룸
      return rendered.join("\n");
    }

    function endsWithNoSpace(s) {
      // 괄호/따옴표/중간점/콤마 앞뒤 공백 흔들림 줄이기
      return /[\(（\[「『“"']$/.test(s);
    }
    function startsWithNoSpace(s) {
      return /^[\)）\]」』”"'\.,，。]/.test(s);
    }

    function cleanText(text, keepKeyword) {
      // 0) 윈도우 줄바꿈 정리
      text = text.replace(/\r\n/g, "\n");

      // 1) 페이지 머리/꼬리말 제거 (연도/회차/형식 문자열)
      // 예: "2024년 제35회 공인중개사 1차 1교시 A형-12-7"
      // 예: "2019년도 제22회 ... ( 13 - 2 )"
      text = text.replace(/^\s*\d{4}년\s*제\d+회.*?A형[-–]\d+[-–]\d+\s*$/gm, "");
      text = text.replace(/^\s*\d{4}년도\s*제\d+회.*?\(\s*\d+\s*-\s*\d+\s*\)\s*$/gm, "");

      // 2) 불필요한 공백/빈줄 정리
      text = text.replace(/[ \t]+\n/g, "\n");
      text = text.replace(/\n{3,}/g, "\n\n");

      // 3) (선택) 특정 키워드 포함 라인만 남기기
      // - “민법”으로 필터하면 해당 단락만 남길 수 있음(완벽하진 않지만 쓸만함)
      if (keepKeyword) {
        const lines = text.split("\n");
        const kept = [];
        let keepMode = false;

        for (const line of lines) {
          const l = line.trim();

          // 키워드를 만나면 keepMode 시작
          if (l.includes(keepKeyword)) keepMode = true;

          // 다른 과목 시작으로 보이면 keepMode 종료(너무 공격적이면 꺼도 됨)
          if (keepMode && /^제\d+과목\s*:/.test(l) && !l.includes(keepKeyword)) keepMode = false;

          if (keepMode) kept.push(line);
        }
        text = kept.join("\n");
      }

      // 4) 문제 번호 앞은 빈줄 1개
      text = text.replace(/\n(\d+\.)/g, "\n\n$1");

      // 5) ㄱ ㄴ ㄷ ㄹ 줄바꿈 강제
      text = text.replace(/\s*(ㄱ|ㄴ|ㄷ|ㄹ|ㅁ|ㅂ)\.\s*/g, "\n$1. ");

      // 6) 선지(①②③④⑤) 무조건 한 줄씩
      text = text.replace(/\s*([①②③④⑤])\s*/g, "\n$1 ");

      // 7) PDF 줄바꿈으로 잘린 문장 붙이기(너무 공격적으로 붙지 않게 “조건부”)
      // - 줄 끝이 "있으" 같이 끊긴 걸 이어붙이려면 더 복잡한 규칙이 필요하지만,
      //   여기선 최소한의 안전 규칙만 적용.
      // - 다음 줄이 선지/문제번호/ㄱㄴㄷ 로 시작하면 유지.
      const lines2 = text.split("\n");
      const merged = [];
      for (let i=0;i<lines2.length;i++) {
        const cur = lines2[i];
        const next = lines2[i+1];

        if (!next) { merged.push(cur); break; }

        const curT = cur.trim();
        const nextT = next.trim();

        const nextIsBlock =
          /^\d+\./.test(nextT) ||
          /^[①②③④⑤]/.test(nextT) ||
          /^[ㄱㄴㄷㄹㅁㅂ]\./.test(nextT) ||
          /^제\d+과목\s*:/.test(nextT);

        // 현재 줄이 문장 끝(마침표/물음표/닫는괄호 등)이면 유지
        const curLooksEnded = /[\.!?。…]$/.test(curT) || /[\)\]）】]$/.test(curT);

        if (!nextIsBlock && !curLooksEnded) {
          // 너무 붙는 걸 막기 위해: 다음 줄이 짧은 머리말이면 줄 유지
          if (nextT.length <= 3) {
            merged.push(cur);
          } else {
            // 줄바꿈 제거 + 공백 하나(문장 연결)
            merged.push(cur.replace(/\s+$/,"") + " " + next.replace(/^\s+/,""));
            i++; // next 소비
          }
        } else {
          merged.push(cur);
        }
      }
      text = merged.join("\n");

      // 8) 다시 빈줄 정리
      text = text.replace(/\n{3,}/g, "\n\n").trim() + "\n";
      return text;
    }

    function downloadTxt() {
      const text = $("output").value || "";
      if (!text.trim()) return;

      const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = "output.txt";
      a.click();

      URL.revokeObjectURL(url);
    }

    async function copyToClipboard() {
      const text = $("output").value || "";
      if (!text.trim()) return;
      await navigator.clipboard.writeText(text);
      alert("복사 완료");
    }
  </script>
</body>
</html>
