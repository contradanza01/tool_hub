<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PDF → Text Cleaner</title>
  <style>
    body{
      font-family: Arial, -apple-system, system-ui, Segoe UI, Roboto, sans-serif;
      max-width: 1100px;
      margin: auto;
      padding: 28px 16px;
      line-height: 1.45;
    }
    h1{ margin: 0 0 10px; }
    .sub{ color:#444; font-size:14px; margin-bottom:18px; }
    .back{ display:inline-block; margin-bottom:14px; text-decoration:none; color:#111; }
    .row{ display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
    input[type="file"]{
      padding:8px;
      border:1px solid #ddd;
      border-radius:10px;
      background:#fafafa;
    }
    button{
      padding:10px 14px;
      border:1px solid #ddd;
      border-radius:12px;
      background:white;
      cursor:pointer;
    }
    button.primary{ background:#111; color:#fff; border-color:#111; }
    button:disabled{ opacity:.45; cursor:not-allowed; }
    .box{
      margin-top:14px;
      padding:12px;
      border:1px solid #e5e5e5;
      border-radius:14px;
      background:#fcfcfc;
    }
    textarea{
      width:100%;
      height: 420px;
      margin-top:12px;
      font-size:14px;
      padding:12px;
      border:1px solid #ddd;
      border-radius:14px;
      resize: vertical;
      white-space: pre;
    }
    .opt{ display:flex; flex-wrap:wrap; gap:14px; margin-top:10px; font-size:14px; }
    .opt label{ display:flex; gap:8px; align-items:center; }
    .hint{ font-size:13px; color:#555; margin-top:8px; }

    /* preview */
    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap:12px;
      margin-top:12px;
    }
    .thumb{
      border:1px solid #ddd;
      border-radius:12px;
      background:white;
      padding:10px;
    }
    .thumb canvas{
      width:100%;
      height:auto;
      display:block;
      border-radius:8px;
      background:#f3f3f3;
    }
    .thumb .meta{
      margin-top:8px;
      font-size:12px;
      color:#333;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }
    .range{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      margin-top:10px;
      font-size:14px;
    }
    .range input{
      width:80px;
      padding:8px 10px;
      border:1px solid #ddd;
      border-radius:10px;
    }
    .status{ font-size:13px; color:#333; }
    .danger{ color:#b00020; }
    .ok{ color:#0a7a20; }
  </style>
</head>

<body>
  <a class="back" href="../">← Tool Hub</a>

  <h1>PDF → Text Cleaner</h1>
  <div class="sub">
    PDF 텍스트의 <b>문장 중간 줄바꿈</b>, <b>글자 단위 띄어쓰기(부 동 산)</b>, <b>선지(①~⑤) 1줄 정렬</b>을 정리합니다.
    <br/>※ 스캔 PDF(이미지)는 텍스트 추출이 아니라 OCR이 필요합니다(이 페이지는 OCR 아님).
  </div>

  <div class="row">
    <input type="file" id="pdfFile" accept="application/pdf" />
    <button class="primary" id="btnLoad" onclick="loadPdf()">Load & Preview</button>
    <button id="btnExtract" onclick="extractSelected()" disabled>Extract (Selected Pages)</button>
    <button id="btnDownload" onclick="downloadTxt()" disabled>Download TXT</button>
    <button id="btnCopy" onclick="copyToClipboard()" disabled>Copy</button>
  </div>

  <div class="opt">
    <label><input type="checkbox" id="optRemoveHeaders" checked /> 시험지 머리말(예: “2019년도 … (13-2)”) 삭제</label>
    <label><input type="checkbox" id="optKeepSubject" /> 과목명(예: “민법”) 유지</label>
    <label><input type="checkbox" id="optFixHangulFragments" checked /> “부 동 산” 같은 글자단위 조각만 붙이기(안전)</label>
    <label><input type="checkbox" id="optApplyLawDict" checked /> 민법 결합어 사전 교정(물권/법률행위 등)</label>
  </div>

  <div class="box">
    <div class="status" id="status">상태: PDF를 선택하고 Load & Preview를 누르세요.</div>
    <div class="range">
      <span>페이지 범위:</span>
      <label>Start <input type="number" id="rangeStart" min="1" value="1"></label>
      <label>End <input type="number" id="rangeEnd" min="1" value="1"></label>
      <span id="rangeHint" class="status"></span>
    </div>

    <div id="previewArea">
      <div class="hint">미리보기는 로드 후 표시됩니다.</div>
    </div>
  </div>

  <textarea id="output" placeholder="추출/정리된 텍스트가 여기에 표시됩니다."></textarea>
  <div class="hint">• 선지는 <b>무조건 1줄씩</b> 출력됩니다.</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    const $ = (id) => document.getElementById(id);

    let pdfDoc = null;      // loaded PDF
    let pdfData = null;     // ArrayBuffer

    function setStatus(msg, cls=""){
      $("status").innerHTML = `상태: <span class="${cls}">${escapeHtml(msg)}</span>`;
    }
    function escapeHtml(s){
      return String(s).replace(/[&<>"']/g, (c)=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
    }

    async function loadPdf(){
      const file = $("pdfFile").files[0];
      if(!file){ alert("PDF를 업로드하세요"); return; }

      $("btnLoad").disabled = true;
      $("btnExtract").disabled = true;
      $("btnDownload").disabled = true;
      $("btnCopy").disabled = true;
      $("output").value = "";
      pdfDoc = null; pdfData = null;

      try{
        setStatus("PDF 로드 중...");
        pdfData = await file.arrayBuffer();
        pdfDoc = await pdfjsLib.getDocument({ data: pdfData }).promise;

        // range init
        $("rangeStart").value = 1;
        $("rangeEnd").value = pdfDoc.numPages;
        $("rangeStart").max = pdfDoc.numPages;
        $("rangeEnd").max = pdfDoc.numPages;

        updateRangeHint();

        await renderThumbnails(pdfDoc);
        $("btnExtract").disabled = false;

        setStatus(`로드 완료 (총 ${pdfDoc.numPages}페이지)`, "ok");
      }catch(err){
        console.error(err);
        setStatus("로드 실패", "danger");
        alert("PDF 로드/미리보기 중 오류가 발생했습니다.");
      }finally{
        $("btnLoad").disabled = false;
      }
    }

    function updateRangeHint(){
      if(!pdfDoc){
        $("rangeHint").textContent = "";
        return;
      }
      const s = parseInt($("rangeStart").value, 10);
      const e = parseInt($("rangeEnd").value, 10);
      if(Number.isNaN(s) || Number.isNaN(e)){
        $("rangeHint").innerHTML = `<span class="danger">숫자를 입력하세요.</span>`;
        return;
      }
      if(s < 1 || e < 1 || s > pdfDoc.numPages || e > pdfDoc.numPages){
        $("rangeHint").innerHTML = `<span class="danger">1 ~ ${pdfDoc.numPages} 범위로 입력</span>`;
        return;
      }
      if(s > e){
        $("rangeHint").innerHTML = `<span class="danger">Start ≤ End</span>`;
        return;
      }
      $("rangeHint").innerHTML = `<span class="ok">${s} ~ ${e} 페이지 처리</span>`;
    }

    $("rangeStart").addEventListener("input", updateRangeHint);
    $("rangeEnd").addEventListener("input", updateRangeHint);

    async function renderThumbnails(pdf){
      const wrap = document.createElement("div");
      wrap.className = "grid";

      $("previewArea").innerHTML = "";
      $("previewArea").appendChild(wrap);

      // 썸네일은 가볍게: 처음 24페이지만 렌더 (너무 큰 PDF 대비)
      const maxThumb = Math.min(pdf.numPages, 24);

      for(let p=1; p<=maxThumb; p++){
        const card = document.createElement("div");
        card.className = "thumb";
        const canvas = document.createElement("canvas");
        const meta = document.createElement("div");
        meta.className = "meta";
        meta.innerHTML = `<span>Page ${p}</span><span class="small"></span>`;
        card.appendChild(canvas);
        card.appendChild(meta);
        wrap.appendChild(card);

        const page = await pdf.getPage(p);
        const viewport = page.getViewport({ scale: 0.35 });
        const ctx = canvas.getContext("2d");
        canvas.width = Math.floor(viewport.width);
        canvas.height = Math.floor(viewport.height);

        await page.render({ canvasContext: ctx, viewport }).promise;
      }

      if(pdf.numPages > maxThumb){
        const note = document.createElement("div");
        note.className = "hint";
        note.textContent = `미리보기는 성능을 위해 ${maxThumb}페이지만 표시됩니다. 범위 입력으로 원하는 페이지를 처리하세요.`;
        $("previewArea").appendChild(note);
      }
    }

    // --------- 텍스트 추출 (선택 범위만) ----------
    async function extractSelected(){
      if(!pdfDoc || !pdfData){
        alert("먼저 Load & Preview를 해주세요.");
        return;
      }

      const s = parseInt($("rangeStart").value, 10);
      const e = parseInt($("rangeEnd").value, 10);
      if(Number.isNaN(s) || Number.isNaN(e) || s<1 || e<1 || s>e || e>pdfDoc.numPages){
        alert("페이지 범위를 올바르게 입력하세요.");
        return;
      }

      $("btnExtract").disabled = true;
      $("btnDownload").disabled = true;
      $("btnCopy").disabled = true;
      $("output").value = "";

      try{
        setStatus(`추출 중... (${s}~${e})`);

        let all = "";
        for(let p=s; p<=e; p++){
          const page = await pdfDoc.getPage(p);
          const content = await page.getTextContent({ normalizeWhitespace: false });
          const lines = groupIntoLines(content.items);
          all += lines.join("\n") + "\n\n";
          setStatus(`추출 중... (${p}/${e})`);
        }

        const cleaned = cleanText(all, {
          removeHeaders: $("optRemoveHeaders").checked,
          keepSubject: $("optKeepSubject").checked,
          fixHangulFragments: $("optFixHangulFragments").checked,
          applyLawDict: $("optApplyLawDict").checked,
        });

        $("output").value = cleaned;

        const ok = cleaned.trim().length > 0;
        $("btnDownload").disabled = !ok;
        $("btnCopy").disabled = !ok;
        setStatus("완료", "ok");
      }catch(err){
        console.error(err);
        setStatus("실패", "danger");
        alert("추출 중 오류가 발생했습니다.");
      }finally{
        $("btnExtract").disabled = false;
      }
    }

    // --------- 좌표 기반 줄 재구성 ----------
    function groupIntoLines(items){
      const lines = [];
      const yTol = 2.0;

      for(const it of items){
        const t = it.transform;
        const x = t[4];
        const y = t[5];
        const str = it.str;
        if(!str || !str.trim()) continue;

        let line = null;
        for(const L of lines){
          if(Math.abs(L.y - y) <= yTol){
            line = L; break;
          }
        }
        if(!line){
          line = { y, items: [] };
          lines.push(line);
        }
        line.items.push({ x, str });
      }

      lines.sort((a,b)=>b.y - a.y);
      return lines.map(L=>{
        L.items.sort((a,b)=>a.x - b.x);
        return L.items.map(i=>i.str).join(" ");
      });
    }

    // --------- 정리 ----------
    function cleanText(text, opts){
      text = (text || "").replace(/\r/g, "");

      if(opts.removeHeaders){
        text = text.replace(/^\s*\d{4}년도.*\(\s*\d+\s*-\s*\d+\s*\)\s*$/gm, "");
        if(!opts.keepSubject){
          text = text.replace(/^\s*(민법|형법|회계원리|시설개론|공동주택관리.*|부동산학개론)\s*$/gm, "");
        }
      }

      text = text.replace(/\n{3,}/g, "\n\n");
      text = text.replace(/(\w)-\n(\w)/g, "$1$2");

      text = joinSoftLineBreaks(text);

      // 핵심 변경: “한글 공백 전부 제거” 금지
      // → “부 동 산”처럼 ‘단일 음절이 연속으로 끊긴 구간’만 붙임
      if(opts.fixHangulFragments){
        text = fixHangulFragmentRuns(text);
      }

      text = normalizeSpaces(text);
      text = formatQuestions(text);

      if(opts.applyLawDict){
        text = applyLawFixDict(text);
      }

      text = text.replace(/[ \t]+\n/g, "\n");
      text = text.replace(/\n{3,}/g, "\n\n").trim();
      return text;
    }

    function isStructuralLine(s){
      const t = (s || "").trim();
      return (
        /^\d+\./.test(t) ||
        /^(ㄱ|ㄴ|ㄷ|ㄹ|ㅁ)\./.test(t) ||
        /^[①②③④⑤]/.test(t) ||
        /^\(.+\)$/.test(t)
      );
    }

    function joinSoftLineBreaks(text){
      const lines = text.split("\n");
      const out = [];

      for(let i=0; i<lines.length; i++){
        const cur = lines[i].replace(/\s+$/g, "");
        const nextRaw = (i+1<lines.length) ? lines[i+1] : "";
        const next = nextRaw.replace(/^\s+/g, "");

        if(cur.trim() === ""){
          out.push("");
          continue;
        }
        if(next.trim() === ""){
          out.push(cur);
          continue;
        }
        if(isStructuralLine(cur) || isStructuralLine(next)){
          out.push(cur);
          continue;
        }
        out.push(cur + " " + next);
        i++;
      }
      return out.join("\n");
    }

    function normalizeSpaces(text){
      text = text.replace(/\s+([,.;:!?])/g, "$1");
      text = text.replace(/\(\s+/g, "(").replace(/\s+\)/g, ")");
      text = text.replace(/[ \t]{2,}/g, " ");
      text = text.replace(/^\s+/gm, "");
      return text;
    }

    function formatQuestions(text){
      text = text.replace(/\n(\d+\.)/g, "\n\n$1");
      text = text.replace(/\s*(ㄱ|ㄴ|ㄷ|ㄹ|ㅁ)\.\s*/g, "\n$1. ");
      text = text.replace(/\s*([①②③④⑤])\s*/g, "\n$1 ");
      text = text.replace(/\n\s*([①②③④⑤])/g, "\n$1");
      text = text.replace(/\n{3,}/g, "\n\n");
      return text;
    }

    // ✅ 안전하게 “글자 단위로 끊긴 구간”만 붙이기
    // 예) "부 동 산 학 개 론" → "부동산학개론"
    // 예) "민법 상" (정상 단어 경계) 같은 건 건드리지 않도록:
    //     '단일 한글 음절'이 3개 이상 연속되는 패턴에만 적용
    function fixHangulFragmentRuns(text){
  // 매우 보수적으로: "한글 1음절 + 공백"이 5회 이상 연속일 때만 붙임
  // 예) "부 동 산 학 개 론" 같은 경우는 붙이고,
  //     정상 문장 공백은 거의 건드리지 않음.
  return text.replace(/(?:[가-힣]\s+){5,}[가-힣]/g, (m) => m.replace(/\s+/g, ""));
  }
    
    function applyLawFixDict(text){
      const dict = [
        [/\b물\s*권\b/g, "물권"],
        [/\b물권\s*적\s*청구권\b/g, "물권적청구권"],
        [/\b물\s*권\s*적\s*청구권\b/g, "물권적청구권"],
        [/\b법률\s*행위\b/g, "법률행위"],
        [/\b의사\s*표시\b/g, "의사표시"],
        [/\b통정\s*허위\s*표시\b/g, "통정허위표시"],
        [/\b소유권이\s*전\b/g, "소유권이전"],
        [/\b소유권이\s*전등기청구권\b/g, "소유권이전등기청구권"],
        [/\b소유권이\s*전청구권\b/g, "소유권이전청구권"],
        [/\b중간\s*생략\s*등기\b/g, "중간생략등기"],
        [/\b소멸\s*시효\b/g, "소멸시효"],
        [/\b무권\s*대리\b/g, "무권대리"],
        [/\b표현\s*대리\b/g, "표현대리"],
        [/\b유권\s*대리\b/g, "유권대리"],
        [/\b손해\s*배상\b/g, "손해배상"],
        [/\b부당\s*이득\b/g, "부당이득"],
        [/\b저당\s*권\b/g, "저당권"],
        [/\b근저당\s*권\b/g, "근저당권"],
        [/\b전세\s*권\b/g, "전세권"],
        [/\b지상\s*권\b/g, "지상권"],
        [/\b유치\s*권\b/g, "유치권"],
      ];
      for(const [re,to] of dict) text = text.replace(re,to);
      return text;
    }

    function downloadTxt(){
      const text = $("output").value || "";
      if(!text.trim()){ alert("다운로드할 텍스트가 없습니다."); return; }
      const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "output.txt";
      a.click();
      URL.revokeObjectURL(url);
    }

    async function copyToClipboard(){
      const text = $("output").value || "";
      if(!text.trim()) return;
      try{
        await navigator.clipboard.writeText(text);
        alert("복사 완료");
      }catch(e){
        alert("복사 실패(브라우저 권한/보안 설정).");
      }
    }
  </script>
</body>
</html>
