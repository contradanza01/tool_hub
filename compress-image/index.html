<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Image Compress</title>

<style>
body{
font-family:Arial;
max-width:800px;
margin:auto;
padding:40px;
}

canvas{
max-width:100%;
border:1px solid #ddd;
margin-top:20px;
}

button{
margin-top:10px;
padding:10px 15px;
}

input{
margin-top:10px;
}

.back{
display:block;
margin-bottom:20px;
}
</style>
</head>

<body>

<a class="back" href="../">← Tool Hub</a>

<h1>Image Compress</h1>

<input type="file" id="imageInput" accept="image/*">

<br>

<label>Quality (0.1 ~ 1)</label>
<input type="range" id="quality" min="0.1" max="1" step="0.1" value="0.7">

<span id="qvalue">0.7</span>

<br>

<button onclick="compressImage()">Compress</button>
<button onclick="downloadImage()">Download</button>

<br>

<canvas id="canvas"></canvas>

<script>

let img = new Image()

document.getElementById("quality").addEventListener("input",function(){
document.getElementById("qvalue").innerText = this.value
})

document.getElementById("imageInput").addEventListener("change",function(e){

const file = e.target.files[0]

const reader = new FileReader()

reader.onload = function(event){

img.onload = function(){

const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")

canvas.width = img.width
canvas.height = img.height

ctx.drawImage(img,0,0)

}

img.src = event.target.result

}

reader.readAsDataURL(file)

})

function compressImage(){

const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")

canvas.width = img.width
canvas.height = img.height

ctx.drawImage(img,0,0)

}

function downloadImage(){

const canvas = document.getElementById("canvas")

const quality = document.getElementById("quality").value

const link = document.createElement("a")

link.download = "compressed.jpg"

link.href = canvas.toDataURL("image/jpeg",quality)

link.click()

}

</script>

</body>
</html>
